name: Build AndLinux APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/android.yml'

jobs:
  build-release:
    name: Build Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew --no-daemon assembleFdroidRelease

      - name: Prepare APK artifact
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/Fdroid/release/*.apk artifacts/Andlinux.apk

      - name: Archive APK
        uses: actions/upload-artifact@v4
        with:
          name: Andlinux-apk
          path: artifacts/Andlinux.apk
# AndLinux 1.5 global stable release build
